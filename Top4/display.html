<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
</head>
<style>
     body {
          margin: auto;
          width: 600px;
          height: 600px;
          display: flex;
          flex-wrap: wrap;
          border: 4px black solid;
          justify-content: space-evenly;
          align-items: center;
     }
     .parent {
          width: 200px;
          height: 200px;
          background-color: rgb(172, 212, 245);
          padding: 5px;
          position: relative;
     } 
     .child {
          width: 50px;
          height: 50px;
          background-color: rgb(255, 47, 168) ;
          display: flex;
          justify-content:center;
          align-items: center;
          color: white;
          position: absolute;
     }
     .child1 {
          left: 5px;
          top: 5px;
     }
     .child2 {
          bottom: 5px;
          left: 5px;
     }
     .child3 {
          top: 50%;
          left: 50%;
          translate: -50% -50%;
     }
     .child4 {
         top: 50%;
         right: 5px;
         transform:translateY(-50%);
     }
</style>
<body>
     <div class="parent">
          <div class="child child1">child</div>
     </div>
     <div class="parent">
          <div class="child child2">child</div>
     </div>
     <div class="parent">
          <div class="child child3">child</div>
     </div>
     <div class="parent">
          <div class="child child4">child</div>
     </div>
</body>
</html>
