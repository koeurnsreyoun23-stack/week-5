<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
</head>
<style>
     body{
          margin: auto;
          width: 600px;
          height: 600px;
          display: flex;
          flex-wrap: wrap;
          border: 4px black solid;
          justify-content:space-evenly;
          align-items: center;
     }
     .parent {
          background-color: pink;
          width: 200px;
          height: 200px;
          display: flex;
          padding: 5px;
     }
     .child {
          background-color: red;
          padding: 5px;
          display: flex;
          color: white;
          align-items: center;
          justify-content: center;
     }
     .child1 {
          width: 500px;
          height: 40px;
     }
     .child2 {
          width: 40px;
          height: 190px;
     }
     .parent-2 {
          padding: 5px;
          align-items: end;
     }
     .parent-3{
          justify-content: center;
          align-items:center;
     }
     .parent-4 {
          justify-content: end;
          align-items: center;
     }
</style>
<body>
     <div class="parent parent-1">
          <div class="child child1">child</div>
     </div>
     <div class="parent parent-2">
          <div class="child child2">child</div>
     </div>
     <div class="parent parent-3">
          <div class="child child1">child</div>
     </div>
     <div class="parent parent-4">
          <div class="child child2">child</div>
     </div>
</body>
</html>
