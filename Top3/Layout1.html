<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
</head>
<style>
     * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
     }
     .head {
          background-color: rgb(170, 170, 243);
          padding: 10px;
          margin: auto;
          width: 400px;
     }
     .page-header, .nav {
          background-color: rgb(237, 236, 252);
          margin-bottom: 10px;
          padding: 5px;
     }
     .article {
          color: blue;
          background-color: pink;
          margin: 0 0 10px 10px;
          padding: 10px;
     }
     .article-header {
          background-color: rgb(237, 236, 252);
          color: black;
          margin-top: 5px;
          margin: auto;
          padding: 5px;
          margin-bottom: 10px;
          width: 100%;
     }
     .main {
          background-color: rgb(237, 236, 252);
          color: black;
          margin-top: 10px;
          padding: 5px;
          height: 80px;
     }
     .section ,.aside ,.footer {
          background-color: rgb(237, 236, 252);
          margin-bottom: 10px;
          padding: 5px;
     }
</style>
<body>
     <div class="head">
          <div class="page-header">Page Header</div>
          <div class="nav">Nav</div>
          <div class="article">Article
               <div class="article-header">Article Header</div>
               <div class="main">Main</div>
          </div>
          <div class="section">Section</div>
          <div class="aside">Aside</div>
          <div class="footer">Footer</div>
     </div>
</body>
</html>
